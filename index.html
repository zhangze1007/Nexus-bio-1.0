<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus-Bio | Next-Gen Bio-Intelligent Architecture</title>
    <meta name="description" content="Nexus-Bio: AI-powered synthetic biology research platform. Extract metabolic pathways, visualize 3D molecular structures, and simulate enzyme kinetics from any research paper." />
    <meta name="keywords" content="Nexus-Bio, synthetic biology, metabolic pathway, AlphaFold, PubChem, enzyme kinetics, bioinformatics" />
    <meta property="og:title" content="Nexus-Bio | Next-Gen Bio-Intelligent Architecture" />
    <meta property="og:description" content="From literature to mechanistic insight — AI-powered metabolic pathway visualization and analysis." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- DM Serif Display — editorial titles -->
    <!-- Inter — clean body text -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

    <style>
      /* ── Global typographic reset ── */
      *, *::before, *::after { box-sizing: border-box; }

      :root {
        --font-serif: 'DM Serif Display', Georgia, serif;
        --font-sans: 'Inter', Arial, -apple-system, sans-serif;
        --font-mono: 'SF Mono', 'Fira Code', 'Fira Mono', monospace;

        /* Typographic scale */
        --text-xs:   0.6875rem;  /* 11px */
        --text-sm:   0.8125rem;  /* 13px */
        --text-base: 0.9375rem;  /* 15px */
        --text-lg:   1.125rem;   /* 18px */
        --text-xl:   1.375rem;   /* 22px */
        --text-2xl:  1.75rem;    /* 28px */
        --text-3xl:  2.25rem;    /* 36px */
        --text-4xl:  3rem;       /* 48px */
        --text-5xl:  4rem;       /* 64px */

        /* Spacing rhythm — 8pt grid */
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-5: 20px;
        --space-6: 24px;
        --space-8: 32px;
        --space-10: 40px;
        --space-12: 48px;
        --space-16: 64px;
        --space-20: 80px;
        --space-24: 96px;

        /* Color tokens */
        --color-bg:        #0a0a0a;
        --color-surface:   #111114;
        --color-surface-2: #18181c;
        --color-border:    rgba(255,255,255,0.07);
        --color-border-2:  rgba(255,255,255,0.12);
        --color-text-1:    rgba(255,255,255,0.92);
        --color-text-2:    rgba(255,255,255,0.55);
        --color-text-3:    rgba(255,255,255,0.28);
        --color-text-4:    rgba(255,255,255,0.14);
        --color-accent:    rgba(200,216,232,0.7);
      }

      html { scroll-behavior: smooth; }

      body {
        margin: 0;
        background: var(--color-bg);
        color: var(--color-text-1);
        font-family: var(--font-sans);
        font-size: var(--text-base);
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Serif utility */
      .serif { font-family: var(--font-serif); }
      .mono  { font-family: var(--font-mono); }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

      /* Selection */
      ::selection { background: rgba(200,216,232,0.2); color: #fff; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
